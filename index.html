<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simba Agent Matrix Redesign</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      overflow: hidden;
      background: #050906;
      color: #effff2;
      font-family: Geist, Satoshi, Outfit, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    canvas {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      background: #050906;
    }

    .matrix-glow {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 64% 42%, rgba(73, 186, 112, 0.12), transparent 31%),
        linear-gradient(90deg, rgba(5,9,6,0.94) 0%, rgba(5,9,6,0.58) 34%, rgba(5,9,6,0.18) 58%, rgba(5,9,6,0.76) 100%),
        linear-gradient(180deg, rgba(5,9,6,0.72), rgba(5,9,6,0.1) 42%, rgba(5,9,6,0.7) 100%);
      mix-blend-mode: normal;
    }

    .scanlines {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.16;
      background: repeating-linear-gradient(
        180deg,
        rgba(112, 214, 132, 0.16) 0,
        rgba(112, 214, 132, 0.16) 1px,
        transparent 1px,
        transparent 4px
      );
    }

    main {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(0, 1.15fr) minmax(220px, 0.85fr);
      align-items: center;
      gap: clamp(24px, 6vw, 94px);
      padding: clamp(32px, 6vw, 82px);
    }

    .hero {
      width: min(790px, 100%);
      padding-left: clamp(0px, 4vw, 64px);
      transform: translateY(18px);
    }

    .kicker {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 26px;
      color: #b7f1c0;
      font-family: "SF Mono", "JetBrains Mono", Consolas, monospace;
      font-size: clamp(11px, 1.4vw, 13px);
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-shadow: 0 1px 18px rgba(73, 186, 112, 0.56);
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #9ad9a6;
      box-shadow: 0 0 0 4px rgba(154, 217, 166, 0.08);
    }

    h1 {
      margin: 0;
      width: max-content;
      max-width: 100%;
      color: #f3fff3;
      font-size: clamp(62px, 9.2vw, 128px);
      font-weight: 860;
      line-height: 0.88;
      letter-spacing: 0;
      text-transform: none;
      text-shadow:
        0 1px 0 rgba(255,255,255,0.28),
        0 18px 56px rgba(0, 0, 0, 0.78);
    }

    .subtitle {
      max-width: 650px;
      margin: 28px 0 36px;
      color: #d9eadc;
      font-size: clamp(17px, 1.7vw, 22px);
      line-height: 1.44;
      text-shadow: 0 2px 22px rgba(0, 0, 0, 0.82);
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(3, minmax(112px, 1fr));
      gap: 14px;
      width: min(620px, 100%);
    }

    button {
      height: 54px;
      min-width: 0;
      padding: 0 22px;
      border: 1px solid rgba(154, 217, 166, 0.62);
      border-radius: 3px;
      background: rgba(13, 32, 17, 0.78);
      color: #f0fff2;
      font: 800 15px Geist, Satoshi, system-ui, sans-serif;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.12),
        0 14px 34px rgba(0, 0, 0, 0.28);
      transition: transform 0.32s cubic-bezier(0.16, 1, 0.3, 1), border-color 0.32s cubic-bezier(0.16, 1, 0.3, 1), background 0.32s cubic-bezier(0.16, 1, 0.3, 1);
    }

    button:hover {
      transform: translateY(-2px);
      border-color: rgba(210, 255, 218, 0.72);
      background: rgba(21, 47, 26, 0.9);
    }

    button:active {
      transform: translateY(1px) scale(0.99);
    }

    button.secondary {
      background: rgba(5, 9, 6, 0.66);
      color: #b8e9c1;
    }

    .visual-panel {
      position: relative;
      z-index: 2;
      display: grid;
      align-content: center;
      gap: 18px;
      min-height: min(62vh, 560px);
      align-self: stretch;
      padding: clamp(22px, 3.4vw, 42px);
      border-left: 1px solid rgba(154, 217, 166, 0.2);
      border-bottom: 1px solid rgba(154, 217, 166, 0.14);
      opacity: 0.92;
    }

    .visual-panel::before,
    .visual-panel::after {
      content: "";
      position: absolute;
      pointer-events: none;
    }

    .visual-panel::before {
      inset: 18% 18% 22% 0;
      background:
        linear-gradient(90deg, transparent, rgba(154, 217, 166, 0.1), transparent),
        repeating-linear-gradient(90deg, transparent 0 34px, rgba(154, 217, 166, 0.12) 34px 35px);
      transform: skewY(-8deg);
    }

    .visual-panel::after {
      right: 0;
      bottom: 0;
      width: 54%;
      height: 38%;
      border-top: 1px solid rgba(154, 217, 166, 0.24);
      border-left: 1px solid rgba(154, 217, 166, 0.18);
      background: linear-gradient(135deg, rgba(154, 217, 166, 0.08), transparent);
    }

    .wallet-shell {
      position: relative;
      z-index: 2;
      width: min(420px, 100%);
      margin-left: auto;
      padding: 28px 30px;
      border: 1px solid rgba(154, 217, 166, 0.22);
      background: rgba(5, 13, 7, 0.54);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.08),
        0 24px 48px rgba(0, 0, 0, 0.24);
    }

    .wallet-address {
      margin: 0;
      color: #f4fff4;
      font-family: "SF Mono", "JetBrains Mono", Consolas, monospace;
      font-size: clamp(22px, 2.3vw, 30px);
      font-weight: 800;
      line-height: 1.24;
      overflow-wrap: anywhere;
    }

    .status {
      position: fixed;
      z-index: 3;
      right: clamp(22px, 5vw, 78px);
      bottom: clamp(24px, 6vw, 52px);
      width: min(430px, calc(100vw - 44px));
      padding: 16px 0 16px 20px;
      border-left: 1px solid rgba(154, 217, 166, 0.72);
      background: linear-gradient(90deg, rgba(154, 217, 166, 0.08), transparent);
      color: #b6eec1;
      font-family: "SF Mono", "JetBrains Mono", Consolas, monospace;
      font-size: 13px;
      font-weight: 700;
      line-height: 1.75;
      text-shadow: 0 1px 14px rgba(73, 186, 112, 0.48);
    }

    @media (max-width: 760px) {
      main {
        grid-template-columns: 1fr;
        align-items: end;
        padding-bottom: 176px;
      }

      .hero {
        padding-left: 0;
      }

      h1 {
        font-size: clamp(54px, 16vw, 88px);
      }

      .side-rail,
      .frame {
        display: none;
      }

      .visual-panel {
        min-height: 0;
        padding: 0;
        border: 0;
      }

      .visual-panel::before,
      .visual-panel::after {
        display: none;
      }

      .wallet-shell {
        display: none;
      }

      .status {
        left: 24px;
        right: 24px;
        bottom: 24px;
      }
    }

    @media (max-width: 520px) {
      .actions {
        grid-template-columns: 1fr;
        width: min(320px, 100%);
      }
    }

    .grain {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.18;
      background-image:
        linear-gradient(115deg, rgba(255,255,255,0.035), transparent 22%),
        repeating-radial-gradient(circle at 17% 31%, rgba(255,255,255,0.08) 0 1px, transparent 1px 4px);
      mix-blend-mode: overlay;
    }

    .frame {
      position: fixed;
      inset: 22px;
      z-index: 1;
      pointer-events: none;
      border: 1px solid rgba(123, 202, 142, 0.17);
      clip-path: polygon(0 0, calc(100% - 84px) 0, 100% 84px, 100% 100%, 84px 100%, 0 calc(100% - 84px));
    }

    .side-rail {
      position: fixed;
      z-index: 3;
      top: 42px;
      right: clamp(22px, 5vw, 70px);
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      color: rgba(190, 245, 199, 0.72);
      font-family: "SF Mono", "JetBrains Mono", Consolas, monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      writing-mode: vertical-rl;
      transform: rotate(180deg);
    }
  </style>
</head>
<body>
  <canvas id="matrix" aria-hidden="true"></canvas>
  <div class="matrix-glow" aria-hidden="true"></div>
  <div class="scanlines" aria-hidden="true"></div>
  <div class="grain" aria-hidden="true"></div>
  <div class="frame" aria-hidden="true"></div>
  <div class="side-rail" aria-hidden="true">binary ascent</div>

  <main>
    <section class="hero">
      <div class="kicker"><span class="dot"></span> Web3 autonomous security agent</div>
      <h1>Simba<br>Agent</h1>
      <p class="subtitle">A cinematic first screen for an AI-powered crypto agent: dark, sharp, and alive with moving binary code.</p>
      <div class="actions">
        <button onclick="location.href='swap.html?from=index'">Swap</button>
        <button class="secondary" onclick="location.href='agent.html?from=index'">Agent</button>
        <button class="secondary" onclick="location.href='send.html?from=index'">Send</button>
      </div>
    </section>
    <section class="visual-panel" aria-label="Generated wallet state">
      <div class="wallet-shell">
        <p class="wallet-address">0x7A3e...91C2</p>
      </div>
    </section>
  </main>

  <aside class="status">
    <div>status: online</div>
    <div>Network: EVM</div>
    <div>wallet: 0x7A3e...91C2</div>
    <div>agent.mode: autonomous</div>
  </aside>

  <script>
    const canvas = document.getElementById("matrix");
    const ctx = canvas.getContext("2d");
    const bits = ["0", "1"];
    let width = 0;
    let height = 0;
    let columns = [];
    let fontSize = 22;

    function reset() {
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = Math.floor(width * dpr);
      canvas.height = Math.floor(height * dpr);
      canvas.style.width = width + "px";
      canvas.style.height = height + "px";
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      fontSize = width < 700 ? 17 : 22;
      const count = Math.ceil(width / fontSize) + 4;
      columns = Array.from({ length: count }, (_, index) => ({
        x: index * fontSize,
        y: -height + Math.random() * height * 2.4,
        speed: 2.6 + Math.random() * 4.3,
        length: 16 + Math.floor(Math.random() * 32),
        fade: 0.58 + Math.random() * 0.42
      }));
    }

    function draw() {
      ctx.fillStyle = "rgba(5, 9, 6, 0.105)";
      ctx.fillRect(0, 0, width, height);
      ctx.font = `${fontSize}px "SF Mono", "JetBrains Mono", Consolas, monospace`;
      ctx.textAlign = "center";

      for (const column of columns) {
        for (let i = 0; i < column.length; i += 1) {
          const char = bits[(Math.random() * bits.length) | 0];
          const y = column.y + i * fontSize;
          const alpha = Math.max(0, 1 - i / column.length) * column.fade;
          const isHead = i === 0;

          ctx.fillStyle = isHead
            ? "rgba(231, 255, 235, 0.86)"
            : `rgba(100, 214, 123, ${alpha})`;
          ctx.shadowColor = "#64d67b";
          ctx.shadowBlur = isHead ? 10 : 4;
          ctx.fillText(char, column.x, y);
        }

        column.y -= column.speed;
        if (column.y + column.length * fontSize < -fontSize) {
          column.y = height + Math.random() * height * 0.4;
          column.speed = 2.6 + Math.random() * 4.3;
          column.length = 16 + Math.floor(Math.random() * 32);
          column.fade = 0.58 + Math.random() * 0.42;
        }
      }

      requestAnimationFrame(draw);
    }

    window.addEventListener("resize", reset);
    reset();
    draw();
  </script>
</body>
</html>
