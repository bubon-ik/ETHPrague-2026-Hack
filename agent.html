<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simba Agent</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      overflow: hidden;
      background: #050906;
      color: #effff2;
      font-family: Geist, Satoshi, Outfit, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    canvas {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      background: #050906;
    }

    .matrix-glow {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 64% 42%, rgba(73, 186, 112, 0.12), transparent 31%),
        linear-gradient(90deg, rgba(5,9,6,0.94) 0%, rgba(5,9,6,0.58) 34%, rgba(5,9,6,0.18) 58%, rgba(5,9,6,0.76) 100%),
        linear-gradient(180deg, rgba(5,9,6,0.72), rgba(5,9,6,0.1) 42%, rgba(5,9,6,0.7) 100%);
      mix-blend-mode: normal;
    }

    .scanlines {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.16;
      background: repeating-linear-gradient(
        180deg,
        rgba(112, 214, 132, 0.16) 0,
        rgba(112, 214, 132, 0.16) 1px,
        transparent 1px,
        transparent 4px
      );
    }

    .grain {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.18;
      background-image:
        linear-gradient(115deg, rgba(255,255,255,0.035), transparent 22%),
        repeating-radial-gradient(circle at 17% 31%, rgba(255,255,255,0.08) 0 1px, transparent 1px 4px);
      mix-blend-mode: overlay;
    }

    .frame {
      position: fixed;
      inset: 22px;
      z-index: 1;
      pointer-events: none;
      border: 1px solid rgba(123, 202, 142, 0.17);
      clip-path: polygon(0 0, calc(100% - 84px) 0, 100% 84px, 100% 100%, 84px 100%, 0 calc(100% - 84px));
    }

    .side-rail {
      position: fixed;
      z-index: 3;
      top: 42px;
      right: clamp(22px, 5vw, 70px);
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      color: rgba(190, 245, 199, 0.72);
      font-family: "SF Mono", "JetBrains Mono", Consolas, monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      writing-mode: vertical-rl;
      transform: rotate(180deg);
    }

    main {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: clamp(32px, 6vw, 82px);
    }

    .agent-shell {
      width: min(720px, 100%);
      display: grid;
      gap: 32px;
      text-align: center;
    }

    .agent-head {
      display: grid;
      gap: 10px;
    }

    .agent-title {
      margin: 0;
      color: #f3fff3;
      font-size: clamp(36px, 5vw, 56px);
      font-weight: 860;
      line-height: 1.1;
      text-shadow:
        0 1px 0 rgba(255,255,255,0.28),
        0 18px 56px rgba(0, 0, 0, 0.78);
    }

    .agent-sub {
      margin: 0;
      color: #b7f1c0;
      font-family: "SF Mono", "JetBrains Mono", Consolas, monospace;
      font-size: clamp(11px, 1.3vw, 13px);
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-shadow: 0 1px 18px rgba(73, 186, 112, 0.56);
    }

    .chat-box {
      position: relative;
      width: 100%;
    }

    .chat-input {
      width: 100%;
      min-height: 64px;
      max-height: 180px;
      padding: 18px 64px 18px 22px;
      border: 1px solid rgba(154, 217, 166, 0.62);
      border-radius: 3px;
      background: rgba(13, 32, 17, 0.78);
      color: #f0fff2;
      font-family: Geist, Satoshi, ui-sans-serif, system-ui, sans-serif;
      font-size: clamp(16px, 1.4vw, 18px);
      font-weight: 500;
      line-height: 1.5;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.12),
        0 14px 34px rgba(0, 0, 0, 0.28);
      outline: none;
      resize: none;
      overflow: auto;
      transition: border-color 0.32s cubic-bezier(0.16, 1, 0.3, 1), background 0.32s cubic-bezier(0.16, 1, 0.3, 1), transform 0.32s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .chat-input::placeholder {
      color: rgba(183, 241, 192, 0.42);
      font-weight: 400;
    }

    .chat-input:focus {
      border-color: rgba(210, 255, 218, 0.72);
      background: rgba(21, 47, 26, 0.9);
      transform: translateY(-2px);
    }

    .chat-send {
      position: absolute;
      right: 12px;
      bottom: 12px;
      width: 40px;
      height: 40px;
      padding: 0;
      border: 1px solid rgba(154, 217, 166, 0.62);
      border-radius: 3px;
      background: rgba(13, 32, 17, 0.9);
      color: #f0fff2;
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
      display: grid;
      place-items: center;
      transition: border-color 0.32s ease, background 0.32s ease;
    }

    .chat-send:hover {
      border-color: rgba(210, 255, 218, 0.72);
      background: rgba(21, 47, 26, 0.95);
    }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
    }

    .chip {
      padding: 8px 14px;
      border: 1px solid rgba(154, 217, 166, 0.35);
      border-radius: 3px;
      background: rgba(5, 9, 6, 0.66);
      color: #b8e9c1;
      font-family: "SF Mono", "JetBrains Mono", Consolas, monospace;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: border-color 0.32s ease, background 0.32s ease, color 0.32s ease;
    }

    .chip:hover {
      border-color: rgba(210, 255, 218, 0.72);
      background: rgba(21, 47, 26, 0.9);
      color: #f0fff2;
    }

    .agent-response {
      min-height: 0;
      margin: -12px auto 0;
      color: #b6eec1;
      font-family: "SF Mono", "JetBrains Mono", Consolas, monospace;
      font-size: 12px;
      font-weight: 700;
      line-height: 1.6;
      opacity: 0;
      transform: translateY(-4px);
      transition: opacity 0.32s cubic-bezier(0.16, 1, 0.3, 1), transform 0.32s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .agent-response.is-visible {
      opacity: 1;
      transform: translateY(0);
    }

    .back-link {
      color: rgba(190, 245, 199, 0.72);
      font-family: "SF Mono", "JetBrains Mono", Consolas, monospace;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-decoration: none;
      transition: color 0.32s ease;
    }

    .back-link:hover {
      color: #d2ffda;
    }

    @media (max-width: 760px) {
      .side-rail,
      .frame {
        display: none;
      }
    }
  </style>
</head>
<body>
  <canvas id="matrix" aria-hidden="true"></canvas>
  <div class="matrix-glow" aria-hidden="true"></div>
  <div class="scanlines" aria-hidden="true"></div>
  <div class="grain" aria-hidden="true"></div>
  <div class="frame" aria-hidden="true"></div>
  <div class="side-rail" aria-hidden="true">binary ascent</div>

  <main>
    <div class="agent-shell">
      <div class="agent-head">
        <div class="agent-sub">Autonomous Web3 Security Agent</div>
        <h1 class="agent-title">Simba Agent</h1>
      </div>

      <div class="chat-box">
        <textarea
          class="chat-input"
          placeholder="What can Simba do for you?"
          rows="1"
          autocomplete="off"
          spellcheck="false"
        ></textarea>
        <button class="chat-send" aria-label="Send">&#10132;</button>
      </div>

      <div class="suggestions">
        <button class="chip">Analyze wallet security</button>
        <button class="chip">Check token contract</button>
        <button class="chip">Generate a safe swap route</button>
        <button class="chip">Scan for phishing</button>
      </div>

      <div class="agent-response" aria-live="polite"></div>

      <a href="index.html" class="back-link">← Back</a>
    </div>
  </main>

  <script>
    const params = new URLSearchParams(location.search);
    if (params.get('from') !== 'index') {
      location.replace('index.html');
    }
  </script>
  <script>
    const canvas = document.getElementById("matrix");
    const ctx = canvas.getContext("2d");
    const bits = ["0", "1"];
    let width = 0;
    let height = 0;
    let columns = [];
    let fontSize = 22;

    function reset() {
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = Math.floor(width * dpr);
      canvas.height = Math.floor(height * dpr);
      canvas.style.width = width + "px";
      canvas.style.height = height + "px";
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      fontSize = width < 700 ? 17 : 22;
      const count = Math.ceil(width / fontSize) + 4;
      columns = Array.from({ length: count }, (_, index) => ({
        x: index * fontSize,
        y: -height + Math.random() * height * 2.4,
        speed: 2.6 + Math.random() * 4.3,
        length: 16 + Math.floor(Math.random() * 32),
        fade: 0.58 + Math.random() * 0.42
      }));
    }

    function draw() {
      ctx.fillStyle = "rgba(5, 9, 6, 0.105)";
      ctx.fillRect(0, 0, width, height);
      ctx.font = `${fontSize}px "SF Mono", "JetBrains Mono", Consolas, monospace`;
      ctx.textAlign = "center";

      for (const column of columns) {
        for (let i = 0; i < column.length; i += 1) {
          const char = bits[(Math.random() * bits.length) | 0];
          const y = column.y + i * fontSize;
          const alpha = Math.max(0, 1 - i / column.length) * column.fade;
          const isHead = i === 0;

          ctx.fillStyle = isHead
            ? "rgba(231, 255, 235, 0.86)"
            : `rgba(100, 214, 123, ${alpha})`;
          ctx.shadowColor = "#64d67b";
          ctx.shadowBlur = isHead ? 10 : 4;
          ctx.fillText(char, column.x, y);
        }

        column.y -= column.speed;
        if (column.y + column.length * fontSize < -fontSize) {
          column.y = height + Math.random() * height * 0.4;
          column.speed = 2.6 + Math.random() * 4.3;
          column.length = 16 + Math.floor(Math.random() * 32);
          column.fade = 0.58 + Math.random() * 0.42;
        }
      }

      requestAnimationFrame(draw);
    }

    window.addEventListener("resize", reset);
    reset();
    draw();

    const textarea = document.querySelector(".chat-input");
    const response = document.querySelector(".agent-response");
    const chips = document.querySelectorAll(".chip");
    const sendButton = document.querySelector(".chat-send");

    function resizeInput() {
      textarea.style.height = 'auto';
      textarea.style.height = Math.min(textarea.scrollHeight, 180) + 'px';
    }

    function setPrompt(value) {
      textarea.value = value;
      resizeInput();
      textarea.focus();
      response.classList.remove("is-visible");
      response.textContent = "";
    }

    textarea.addEventListener('input', () => {
      resizeInput();
      response.classList.remove("is-visible");
      response.textContent = "";
    });

    chips.forEach((chip) => {
      chip.addEventListener("click", () => setPrompt(chip.textContent.trim()));
    });

    sendButton.addEventListener("click", () => {
      const prompt = textarea.value.trim();
      if (!prompt) {
        response.textContent = "agent.input: waiting for a request";
      } else {
        response.textContent = "agent.request: queued for API connection";
      }
      response.classList.add("is-visible");
    });
  </script>
</body>
</html>
